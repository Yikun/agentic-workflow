# Generated by agentic-workflow-installer
name: Stage 2.5 - Testcase Dev
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  testcase_dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 计算 Issue 工作目录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ inputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NO" -R "${{ github.repository }}" --json title --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' | cut -c1-40)
          echo "ISSUE_DIR=agentic-issues/issue-${ISSUE_NO}-${SLUG}" >> "$GITHUB_ENV"

      - name: 校验依赖产物
        run: |
          test -f "$ISSUE_DIR/01-requirements.md"
          test -d "$ISSUE_DIR/src"

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 testcase-dev Agent
        run: |
          PROMPT=$(sed "s|artifacts/|${ISSUE_DIR}/|g" .github/workflows/agents/testcase-dev/CLAUDE.md)
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$PROMPT"

      - name: 校验产物
        run: test -f "$ISSUE_DIR/03-test-cases.md"

      - name: 提交产物
        run: |
          git add "$ISSUE_DIR/03-test-cases.md"
          git commit -m "ci: 验收测试用例 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 触发 tester
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ inputs.issue_number }}" -R "${{ github.repository }}" \
            --body "验收测试用例已生成，自动进入第三阶段测试。"
          gh workflow run 03-tester.yml -R "${{ github.repository }}" -f issue_number=${{ inputs.issue_number }}
