# Generated by agentic-workflow-installer
name: Stage 1 - Requirements QA
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

permissions:
  contents: write
  issues: write

jobs:
  requirements_qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 校验需求文档存在
        run: |
          test -f artifacts/01-requirements.md || (echo "缺少 artifacts/01-requirements.md" && exit 1)

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | sh

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 requirements-qa Agent
        run: |
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$(cat agents/requirements-qa/CLAUDE.md)"

      - name: 校验 QA 报告
        run: test -f artifacts/01-requirements-qa.md

      - name: 提交产物
        run: |
          git add artifacts/01-requirements-qa.md
          git commit -m "ci: 阶段一需求 QA 报告 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 发布下一步指引评论
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ inputs.issue_number }} \
            --body "需求分析阶段已完成，QA 审查报告已写入 \`artifacts/01-requirements-qa.md\`。

          若认可结果，请由 Issue 作者评论 \`/approve\` 进入第二阶段；若需修改，请直接回复本评论描述修改意见。"
