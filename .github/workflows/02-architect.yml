# Generated by agentic-workflow-installer
name: Stage 2 - Architect
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

concurrency:
  group: stage2-${{ inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  architect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 校验需求文档存在
        run: test -f artifacts/01-requirements.md

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 architect Agent
        run: |
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-max \
            "$(cat agents/architect/CLAUDE.md)"

      - name: 校验产物
        run: test -f artifacts/02-architecture.md

      - name: 提交产物
        run: |
          git add artifacts/02-architecture.md
          git commit -m "ci: 阶段二架构文档 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 触发 architect-qa
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run 02-architect-qa.yml --repo ${{ github.repository }} -f issue_number=${{ inputs.issue_number }}
