# Generated by agentic-workflow-installer
name: Stage 2 - Architect QA
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

concurrency:
  group: stage2-${{ inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  architect_qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 计算 Issue 工作目录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ inputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NO" -R "${{ github.repository }}" --json title --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' | cut -c1-40)
          echo "ISSUE_DIR=agentic-issues/issue-${ISSUE_NO}-${SLUG}" >> "$GITHUB_ENV"

      - name: 校验架构文档存在
        run: test -f "$ISSUE_DIR/02-architecture.md"

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 architect-qa Agent
        run: |
          PROMPT=$(sed "s|artifacts/|${ISSUE_DIR}/|g" .github/workflows/agents/architect-qa/CLAUDE.md)
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$PROMPT"

      - name: 校验 QA 报告
        run: test -f "$ISSUE_DIR/02-architecture-qa.md"

      - name: 提交产物
        run: |
          git add "$ISSUE_DIR/02-architecture-qa.md"
          git commit -m "ci: 阶段二架构 QA 报告 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 触发 coder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run 02-coder.yml --repo ${{ github.repository }} -f issue_number=${{ inputs.issue_number }}
