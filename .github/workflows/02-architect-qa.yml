# Generated by agentic-workflow-installer
name: Stage 2 - Architect QA
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

concurrency:
  group: stage2-${{ inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  architect_qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 校验架构文档存在
        run: test -f artifacts/02-architecture.md

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 architect-qa Agent
        run: |
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$(cat agents/architect-qa/CLAUDE.md)"

      - name: 校验 QA 报告
        run: test -f artifacts/02-architecture-qa.md

      - name: 提交产物
        run: |
          git add artifacts/02-architecture-qa.md
          git commit -m "ci: 阶段二架构 QA 报告 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 触发 coder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run 02-coder.yml -f issue_number=${{ inputs.issue_number }}
