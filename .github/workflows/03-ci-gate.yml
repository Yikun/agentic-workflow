# Generated by agentic-workflow-installer
name: Stage 3 Gate - CI
on:
  check_suite:
    types: [completed]

permissions:
  contents: read
  actions: write
  issues: write
  checks: read

jobs:
  ci_gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 校验 Required CI 检查是否全部成功
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m agentic_workflow.ci_gate \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo "${{ github.repository }}" \
            --output "$GITHUB_OUTPUT"
      - name: 触发 tester
        if: ${{ steps.gate.outputs.pass == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ steps.gate.outputs.issue_number }}"
          gh issue comment "$ISSUE_NO" --body "PR Required CI 检查已全部通过，自动进入第三阶段测试。"
          gh workflow run 03-tester.yml \
            --repo ${{ github.repository }} \
            --ref "${{ github.ref_name }}" \
            -f issue_number="$ISSUE_NO"
      - name: 记录门禁未通过原因
        if: ${{ steps.gate.outputs.pass != 'true' }}
        run: |
          echo "CI 门禁未通过：${{ steps.gate.outputs.reason }}"
