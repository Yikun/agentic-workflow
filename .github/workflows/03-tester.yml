# Generated by agentic-workflow-installer
name: Stage 3 - Tester
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

permissions:
  contents: write
  issues: write

jobs:
  tester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 计算 Issue 工作目录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ inputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NO" -R "${{ github.repository }}" --json title --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' | cut -c1-40)
          echo "ISSUE_DIR=agentic-issues/issue-${ISSUE_NO}-${SLUG}" >> "$GITHUB_ENV"

      - name: 校验依赖产物
        run: |
          test -f "$ISSUE_DIR/03-test-cases.md"
          test -d "$ISSUE_DIR/src"

      - name: 安装 Python 依赖
        run: pip install -e src/

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 tester Agent
        run: |
          PROMPT=$(sed "s|artifacts/|${ISSUE_DIR}/|g" .github/workflows/agents/tester/CLAUDE.md)
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/glm-5 \
            "$PROMPT"

      - name: 校验测试报告
        run: test -f "$ISSUE_DIR/04-report.md"

      - name: 提取最终结论
        id: result
        run: |
          VERDICT=$(grep -oE '\*{0,2}(PASS|FAIL)\*{0,2}' "$ISSUE_DIR/04-report.md" \
            | sed 's/\*//g' | grep -E '^(PASS|FAIL)$' | tail -1 || echo "UNKNOWN")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: 提交产物
        run: |
          git add "$ISSUE_DIR/04-report.md"
          git commit -m "ci: 验收测试报告 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 发布测试结论
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT="${{ steps.result.outputs.verdict }}"
          ISSUE_NO="${{ inputs.issue_number }}"
          REPO="${{ github.repository }}"
          BRANCH="agentic/issue-${ISSUE_NO}"
          BRANCH_URL="https://github.com/$REPO/tree/$BRANCH"
          FMT="## 阶段三测试已完成 — ${RESULT}\n\n产物目录：\`${ISSUE_DIR}\`\n"
          FMT="${FMT}- 测试用例：\`03-test-cases.md\`\n"
          FMT="${FMT}- 测试报告：\`04-report.md\`\n"
          FMT="${FMT}\n分支：${BRANCH_URL}"
          BODY=$(printf '%s' "$FMT")
          gh issue comment "$ISSUE_NO" -R "$REPO" --body "$BODY"

      - name: 若验收失败则标记工作流失败
        if: ${{ steps.result.outputs.verdict != 'PASS' }}
        run: |
          echo "验收测试结论为 FAIL。"
          exit 1
