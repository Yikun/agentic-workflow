# Generated by agentic-workflow-installer
name: Stage 3 - Tester
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

permissions:
  contents: write
  issues: write

jobs:
  tester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 校验依赖产物
        run: |
          test -f docs/03-test-cases.md
          test -d docs/src

      - name: 安装 Python 依赖
        run: pip install -e docs/src/

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 tester Agent
        run: |
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$(cat agents/tester/CLAUDE.md)"

      - name: 校验测试报告
        run: test -f docs/04-report.md

      - name: 提取最终结论
        id: result
        run: |
          VERDICT=$(grep -E "^(PASS|FAIL)$" docs/04-report.md | tail -1 || echo "UNKNOWN")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: 提交产物
        run: |
          git add docs/04-report.md
          git commit -m "ci: 验收测试报告 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 归档本 Issue 产物
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ inputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NO" -R "${{ github.repository }}" --json title --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' | cut -c1-40)
          ARCHIVE_DIR="agentic-issues/issue-${ISSUE_NO}-${SLUG}"
          mkdir -p "$ARCHIVE_DIR"
          cp docs/*.md "$ARCHIVE_DIR/" 2>/dev/null || true
          cp -r docs/src "$ARCHIVE_DIR/" 2>/dev/null || true
          git add "$ARCHIVE_DIR"
          git commit -m "archive: issue #${ISSUE_NO} — ${TITLE}" || true
          git push
          echo "ARCHIVE_DIR=$ARCHIVE_DIR" >> "$GITHUB_ENV"

      - name: 发布测试结论
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT="${{ steps.result.outputs.verdict }}"
          ISSUE_NO="${{ inputs.issue_number }}"
          REPO="${{ github.repository }}"
          BRANCH="agentic/issue-${ISSUE_NO}"
          BRANCH_URL="https://github.com/$REPO/tree/$BRANCH"
          FMT="## 阶段三测试已完成 — ${RESULT}\n\n产物文档：\n"
          FMT="${FMT}- 测试用例：\`docs/03-test-cases.md\`\n"
          FMT="${FMT}- 测试报告：\`docs/04-report.md\`\n"
          FMT="${FMT}- Issue 归档：\`${ARCHIVE_DIR}\`\n"
          FMT="${FMT}\n分支：${BRANCH_URL}"
          BODY=$(printf '%s' "$FMT")
          gh issue comment "$ISSUE_NO" -R "$REPO" --body "$BODY"

      - name: 若验收失败则标记工作流失败
        if: ${{ steps.result.outputs.verdict != 'PASS' }}
        run: |
          echo "验收测试结论为 FAIL。"
          exit 1
