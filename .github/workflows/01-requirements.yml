# Generated by agentic-workflow-installer
name: Stage 1 - Requirements
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  requirements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: 拉取 Issue 内容写入 user-brief
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue view ${{ inputs.issue_number }} \
            --json number,title,body \
            --jq '"# Issue #\(.number) — \(.title)\n\n\(.body)"' \
            > docs/00-user-brief.md

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 requirements Agent
        run: |
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$(cat agents/requirements/CLAUDE.md)"

      - name: 校验产物
        run: test -f docs/01-requirements.md

      - name: 提交产物
        run: |
          git add docs/00-user-brief.md docs/01-requirements.md
          git commit -m "ci: 阶段一需求文档 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 触发 requirements-qa
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run 01-requirements-qa.yml \
            --repo ${{ github.repository }} \
            -f issue_number=${{ inputs.issue_number }}
