# Generated by agentic-workflow-installer
name: Stage 1 - Requirements
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  requirements:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"

      - name: 计算 Issue 工作目录并写入 user-brief
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ inputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NO" -R "${{ github.repository }}" --json title --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' | cut -c1-40)
          ISSUE_DIR="agentic-issues/issue-${ISSUE_NO}-${SLUG}"
          mkdir -p "$ISSUE_DIR"
          echo "ISSUE_DIR=$ISSUE_DIR" >> "$GITHUB_ENV"
          gh issue view "$ISSUE_NO" -R "${{ github.repository }}" \
            --json number,title,body \
            --jq '"# Issue #\(.number) — \(.title)\n\n\(.body)"' \
            > "$ISSUE_DIR/00-user-brief.md"

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 requirements Agent
        run: |
          PROMPT=$(sed "s|artifacts/|${ISSUE_DIR}/|g" .github/workflows/agents/requirements/CLAUDE.md)
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-plus \
            "$PROMPT"

      - name: 校验产物
        run: test -f "$ISSUE_DIR/01-requirements.md"

      - name: 提交产物
        run: |
          git add "$ISSUE_DIR"
          git commit -m "ci: 阶段一需求文档 (Issue #${{ inputs.issue_number }})" || true
          git push

      - name: 触发 requirements-qa
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run 01-requirements-qa.yml \
            --repo ${{ github.repository }} \
            -f issue_number=${{ inputs.issue_number }}
