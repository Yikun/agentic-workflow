# Generated by agentic-workflow-installer
name: Stage 2 - Coder
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "目标 Issue 编号"
        required: true
        type: number

concurrency:
  group: stage2-${{ inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  coder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase

      - name: 计算 Issue 工作目录
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO="${{ inputs.issue_number }}"
          TITLE=$(gh issue view "$ISSUE_NO" -R "${{ github.repository }}" --json title --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' | cut -c1-40)
          echo "ISSUE_DIR=agentic-issues/issue-${ISSUE_NO}-${SLUG}" >> "$GITHUB_ENV"

      - name: 校验依赖产物
        run: |
          test -f "$ISSUE_DIR/01-requirements.md"
          test -f "$ISSUE_DIR/02-architecture.md"

      - name: 切换到功能分支
        run: |
          git checkout -B "agentic/issue-${{ inputs.issue_number }}"

      - name: 安装 opencode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: 配置 opencode 凭据
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}' "$DASHSCOPE_API_KEY" \
            > ~/.local/share/opencode/auth.json

      - name: 运行 coder Agent
        run: |
          PROMPT=$(sed "s|artifacts/|${ISSUE_DIR}/|g" .github/workflows/agents/coder/CLAUDE.md)
          ~/.opencode/bin/opencode run \
            --dangerously-skip-permissions \
            -m alibaba-cn/qwen-max \
            "$PROMPT"

      - name: 校验代码产物
        run: test -d "$ISSUE_DIR/src"

      - name: 提交代码并创建 PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NO=${{ inputs.issue_number }}
          BRANCH=agentic/issue-${{ inputs.issue_number }}
          git add "$ISSUE_DIR/src"
          git commit -m "feat: issue-$ISSUE_NO 阶段二代码交付" || true
          git push --set-upstream origin "$BRANCH" --force-with-lease
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "实现 Issue #$ISSUE_NO 的阶段二交付" \
            --body "自动化阶段二产物，Closes #$ISSUE_NO" \
            || echo "PR 已存在，跳过创建"

      - name: 触发 testcase-dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run 02-testcase-dev.yml --repo ${{ github.repository }} -f issue_number=${{ inputs.issue_number }}
